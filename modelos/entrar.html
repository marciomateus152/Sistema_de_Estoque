<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Estoque Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-xl shadow-2xl w-96">
        <h2 class="text-3xl font-black text-center text-slate-800 mb-8">ESTOQUE<span class="text-emerald-500">PRO</span></h2>
        
        {% with mensagens = get_flashed_messages(with_categories=true) %}
            {% if mensagens %}
                {% for categoria, texto in mensagens %}
                    <div class="p-3 mb-4 rounded font-semibold text-white text-sm bg-red-500">
                        {{ texto }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/entrar" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Usuário</label>
                <input type="text" name="nome_acesso" required 
                       class="w-full border-2 border-slate-200 p-3 rounded-lg outline-none focus:border-emerald-500 transition" 
                       placeholder="Digite seu usuário">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Senha</label>
                <input type="password" name="senha" required 
                       class="w-full border-2 border-slate-200 p-3 rounded-lg outline-none focus:border-emerald-500 transition" 
                       placeholder="Digite sua senha">
            </div>
            <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-lg hover:bg-emerald-600 transition shadow-lg mt-4">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
